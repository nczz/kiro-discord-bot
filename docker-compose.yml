services:
  discord-bot:
    build: .
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - KIRO_CLI_PATH=${KIRO_CLI_PATH:-/root/.local/bin/kiro-cli}
      - DEFAULT_CWD=/projects
      - DATA_DIR=/data
      - ASK_TIMEOUT_SEC=${ASK_TIMEOUT_SEC:-300}
      - STREAM_UPDATE_SEC=3
      - KIRO_MODEL=${KIRO_MODEL:-}
      - HEARTBEAT_SEC=${HEARTBEAT_SEC:-60}
      - ATTACHMENT_RETAIN_DAYS=${ATTACHMENT_RETAIN_DAYS:-7}
      - CRON_TIMEZONE=${CRON_TIMEZONE:-}
      - BOT_LOCALE=${BOT_LOCALE:-en}
      - SKIP_PREFLIGHT=${SKIP_PREFLIGHT:-}
    volumes:
      - bot-data:/data
      - ${HOME}/.kiro:/root/.kiro
      - ${PROJECTS_DIR:-/projects}:/projects
    network_mode: host
    restart: unless-stopped

volumes:
  bot-data:

services:
  discord-bot:
    build: .
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - KIRO_CLI_PATH=${KIRO_CLI_PATH:-/root/.local/bin/kiro-cli}
      - DEFAULT_CWD=/projects
      - DATA_DIR=/data
      - KIRO_API_KEY=${KIRO_API_KEY:-}
      - ASK_TIMEOUT_SEC=${ASK_TIMEOUT_SEC:-300}
      - ALLOWED_CWD_ROOTS=${ALLOWED_CWD_ROOTS:-/projects}
      - STREAM_UPDATE_SEC=3
      - THREAD_AUTO_ARCHIVE=${THREAD_AUTO_ARCHIVE:-1440}
      - THREAD_AGENT_MAX=${THREAD_AGENT_MAX:-5}
      - THREAD_AGENT_IDLE_SEC=${THREAD_AGENT_IDLE_SEC:-900}
      - CHANNEL_AGENT_IDLE_SEC=${CHANNEL_AGENT_IDLE_SEC:-0}
      - KIRO_MODEL=${KIRO_MODEL:-}
      - HEARTBEAT_SEC=${HEARTBEAT_SEC:-60}
      - ATTACHMENT_RETAIN_DAYS=${ATTACHMENT_RETAIN_DAYS:-7}
      - ATTACHMENT_MAX_MB=${ATTACHMENT_MAX_MB:-25}
      - CRON_TIMEZONE=${CRON_TIMEZONE:-}
      - BOT_LOCALE=${BOT_LOCALE:-en}
      - DOWNLOAD_TIMEOUT_SEC=${DOWNLOAD_TIMEOUT_SEC:-120}
      - QUEUE_BUFFER_SIZE=${QUEUE_BUFFER_SIZE:-20}
      - MAX_SCANNER_BUFFER_MB=${MAX_SCANNER_BUFFER_MB:-64}
      - KIRO_AGENT=${KIRO_AGENT:-}
      - TRUST_ALL_TOOLS=${TRUST_ALL_TOOLS:-true}
      - TRUST_TOOLS=${TRUST_TOOLS:-}
      - PREFLIGHT_MODE=${PREFLIGHT_MODE:-warn}
      - BOT_PEERS=${BOT_PEERS:-}
      - SKIP_PREFLIGHT=${SKIP_PREFLIGHT:-}
      - MCP_DISCORD_ALLOWED_GUILDS=${MCP_DISCORD_ALLOWED_GUILDS:-}
      - MCP_DISCORD_ALLOWED_CHANNELS=${MCP_DISCORD_ALLOWED_CHANNELS:-}
      - MCP_DISCORD_DOWNLOAD_DIR=${MCP_DISCORD_DOWNLOAD_DIR:-}
      - MCP_DISCORD_READ_ONLY=${MCP_DISCORD_READ_ONLY:-false}
      - MCP_DISCORD_ALLOWED_WRITE_TOOLS=${MCP_DISCORD_ALLOWED_WRITE_TOOLS:-}
      - MCP_DISCORD_ALLOW_DESTRUCTIVE=${MCP_DISCORD_ALLOW_DESTRUCTIVE:-true}
      - STT_ENABLED=${STT_ENABLED:-false}
      - STT_PROVIDER=${STT_PROVIDER:-groq}
      - STT_API_KEY=${STT_API_KEY:-}
      - STT_MODEL=${STT_MODEL:-}
      - STT_LANGUAGE=${STT_LANGUAGE:-}
      - STT_MAX_DURATION_SEC=${STT_MAX_DURATION_SEC:-300}
    volumes:
      - bot-data:/data
      - ${HOME}/.kiro:/root/.kiro
      - ${PROJECTS_DIR:-/projects}:/projects
    network_mode: host
    restart: unless-stopped

volumes:
  bot-data:
